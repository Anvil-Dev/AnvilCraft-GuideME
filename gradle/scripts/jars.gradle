tasks.named('processResources', ProcessResources) {
    from('guidebook') {
        into "assets/${project.mod_id}/anvilcraft_guideme"
    }
}

tasks.named('jar', Jar) {
    exclude '/.cache'
}

tasks.register('sourcesJar', Jar) {
    from delombok.outputs.files
    dependsOn delombok
    archiveClassifier = "sources"
}

jar {
    from(project.file("LICENSE"))
    from(project.file("ASSETS_LICENSE"))
    from(project.file("README.md"))
    from(project.file("README_en.md"))
}

base {
    archivesName = "${project.name}-${libs.versions.minecraft.get()}"
}
